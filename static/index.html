<!doctype html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IHD Frontend</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/agile.css" />
    <link rel="stylesheet" href="/static/css/history.css" />
    <link rel="stylesheet" href="/static/css/settings.css" />
    <link rel="stylesheet" href="/static/css/costs.css" />
    <link rel="stylesheet" href="/static/css/gauge.css" />
</head>

<body>
    <div class="dashboard" id="dashboard" data-dev-mode="false">
        <header class="dashboard-header">
            <div class="header-time" id="header-time">00:00</div>

            <div class="header-actions">
                <div class="header-icon-group" id="header-icon-group">
                    <button class="icon-button" id="costs-button" type="button" aria-label="View device costs">
                        <span class="icon-currency" aria-hidden="true">£</span>
                    </button>

                    <button class="icon-button" id="history-button" type="button" aria-label="View history">
                        <svg viewBox="0 0 24 24" class="icon-svg">
                            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>

                    <button class="icon-button" id="settings-button" type="button" aria-label="Open settings">
                        <svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                </div>

                <div class="poll-indicator" id="poll-indicator" aria-hidden="true"></div>
            </div>
        </header>

        <main class="dashboard-main">
            <section class="top-row">
                <article class="panel metric-panel costs-today-panel" id="costs-today-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">Costs Today</h2>
                    </div>

                    <div class="panel-value" id="costs-today-total">--</div>

                    <div class="costs-today-breakdown">
                        <div class="costs-budget-row electricity">
                            <div>
                                <div class="costs-budget-label">⚡ Electricity</div>
                                <div class="costs-budget-value" id="costs-today-electricity">--</div>
                                <div class="costs-budget-caption" id="costs-electricity-budget">Budget £2.00</div>
                            </div>

                            <div class="costs-budget-gauge">
                                <div class="costs-budget-percent" id="costs-electricity-percent">--</div>
                                <svg viewBox="0 0 120 70" aria-hidden="true">
                                    <path class="costs-budget-track" d="M 15 60 A 45 45 0 0 1 105 60"
                                        pathLength="100" />
                                    <path id="costs-electricity-gauge" class="costs-budget-fill electricity"
                                        d="M 15 60 A 45 45 0 0 1 105 60" pathLength="100" stroke-dasharray="0 100" />
                                </svg>
                            </div>
                        </div>

                        <div class="costs-budget-row gas">
                            <div>
                                <div class="costs-budget-label">💧 Gas</div>
                                <div class="costs-budget-value" id="costs-today-gas">--</div>
                                <div class="costs-budget-caption" id="costs-gas-budget">Budget £5.00</div>
                            </div>

                            <div class="costs-budget-gauge">
                                <div class="costs-budget-percent" id="costs-gas-percent">--</div>
                                <svg viewBox="0 0 120 70" aria-hidden="true">
                                    <path class="costs-budget-track" d="M 15 60 A 45 45 0 0 1 105 60"
                                        pathLength="100" />
                                    <path id="costs-gas-gauge" class="costs-budget-fill gas"
                                        d="M 15 60 A 45 45 0 0 1 105 60" pathLength="100" stroke-dasharray="0 100" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </article>

                <article class="panel metric-panel" id="usage-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">House Usage</h2>
                    </div>

                    <div class="panel-value" id="usage-main-value">--</div>
                    <div class="panel-subtext" id="usage-subtext">Electricity + Gas</div>

                    <div class="gauge-wrap gauge-wrap-house">
                        <svg class="gauge gauge-double gauge-house-large" viewBox="0 0 320 180" aria-hidden="true">
                            <path class="gauge-track" d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" />
                            <path id="usage-gauge-electric" class="gauge-fill gauge-fill-electric"
                                d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" stroke-dasharray="0 100" />
                        </svg>
                    </div>
                </article>

                <article class="panel metric-panel" id="solar-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">Solar</h2>
                        <div class="solar-export-icon" id="solar-export-icon" aria-label="Exporting electricity" hidden>
                            ⚡
                        </div>
                    </div>

                    <div class="panel-value">--</div>
                    <div class="panel-subtext">Current generation</div>

                    <div class="gauge-wrap gauge-wrap-solar">
                        <svg class="gauge gauge-single gauge-solar-large" viewBox="0 0 320 180" aria-hidden="true">
                            <path id="solar-gauge-track" class="gauge-track" d="M 30 150 A 130 130 0 0 1 290 150"
                                pathLength="100" />
                            <path id="solar-gauge-fill" class="gauge-fill gauge-fill-solar"
                                d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" stroke-dasharray="0 100" />
                        </svg>
                    </div>
                </article>

                <article class="panel metric-panel" id="battery-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">Battery</h2>
                    </div>

                    <div class="panel-body battery-panel-body">
                        <div class="panel-value panel-value-muted">--</div>
                        <div class="panel-subtext">Not available yet</div>

                        <div class="battery-widget">
                            <div class="battery-bar">
                                <div class="battery-fill" style="height: 65%"></div>
                            </div>

                            <div class="battery-meta">
                                <div class="battery-value">65%</div>
                                <div class="battery-caption">5.2kWh</div>
                            </div>
                        </div>
                    </div>
                </article>
            </section>

            <section class="panel appliance-row" id="appliance-row">
                <div class="appliance-item">
                    <span class="appliance-label">Washer</span>
                    <span class="appliance-value" id="appliance-washing-machine">--</span>
                </div>

                <div class="appliance-item">
                    <span class="appliance-label">Dishwasher</span>
                    <span class="appliance-value" id="appliance-dishwasher">--</span>
                </div>

                <div class="appliance-item">
                    <span class="appliance-label">Dryer</span>
                    <span class="appliance-value" id="appliance-tumble-dryer">--</span>
                </div>
            </section>

            <section class="panel agile-panel" id="agile-card">
                <div class="panel-header-row">
                    <h2 class="panel-title">Agile Rates</h2>
                </div>

                <div class="agile-chart-wrap">
                    <div class="agile-chart" id="agile-chart"></div>
                    <div class="agile-time-axis" id="agile-time-axis"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="cost-usage-modal-root"></div>
    <div id="settings-modal-root"></div>
    <div id="history-modal-root"></div>

    <script type="module" src="/static/js/app.js"></script>
</body>

</html>
