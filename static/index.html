<!doctype html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IHD Frontend</title>
    <link rel="stylesheet" href="/static/css/app.css" />
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-time" id="header-time">00:00</div>
        </header>

        <main class="dashboard-main">
            <section class="top-row">
                <article class="panel metric-panel" id="usage-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">House Usage</h2>
                    </div>

                    <div class="panel-value">--</div>
                    <div class="panel-subtext">Electricity + Gas</div>

                    <div class="gauge-wrap gauge-wrap-house">
                        <svg class="gauge gauge-double gauge-house-large" viewBox="0 0 320 180" aria-hidden="true">
                            <path class="gauge-track" d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" />
                            <path id="usage-gauge-electric" class="gauge-fill gauge-fill-electric"
                                d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" stroke-dasharray="0 100" />

                            <path class="gauge-track gauge-track-inner" d="M 60 150 A 100 100 0 0 1 260 150"
                                pathLength="100" />
                            <path id="usage-gauge-gas" class="gauge-fill gauge-fill-gas gauge-unavailable"
                                d="M 60 150 A 100 100 0 0 1 260 150" pathLength="100" stroke-dasharray="0 100" />
                        </svg>
                    </div>
                </article>

                <article class="panel metric-panel" id="solar-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">Solar</h2>
                    </div>

                    <div class="panel-value">--</div>
                    <div class="panel-subtext">Current generation</div>

                    <div class="gauge-wrap gauge-wrap-solar">
                        <svg class="gauge gauge-single gauge-solar-large" viewBox="0 0 320 180" aria-hidden="true">
                            <path id="solar-gauge-track" class="gauge-track" d="M 30 150 A 130 130 0 0 1 290 150"
                                pathLength="100" />
                            <path id="solar-gauge-fill" class="gauge-fill gauge-fill-solar"
                                d="M 30 150 A 130 130 0 0 1 290 150" pathLength="100" stroke-dasharray="0 100" />
                        </svg>
                    </div>
                </article>

                <article class="panel metric-panel" id="battery-panel">
                    <div class="panel-header-row">
                        <h2 class="panel-title">Battery</h2>
                    </div>

                    <div class="panel-body battery-panel-body">
                        <div class="panel-value panel-value-muted">--</div>
                        <div class="panel-subtext">Not available yet</div>

                        <div class="battery-widget">
                            <div class="battery-bar">
                                <div class="battery-fill" style="height: 65%"></div>
                            </div>

                            <div class="battery-meta">
                                <div class="battery-value">65%</div>
                                <div class="battery-caption">5.2kWh</div>
                            </div>
                        </div>
                    </div>
                </article>
            </section>

            <section class="panel agile-panel" id="agile-card">
                <div class="panel-header-row">
                    <h2 class="panel-title">Agile Rates</h2>
                </div>

                <div class="agile-chart-wrap">
                    <div class="agile-chart" id="agile-chart"></div>
                    <div class="agile-time-axis" id="agile-time-axis"></div>
                </div>

                <button class="debug-toggle" id="debug-toggle" type="button">
                    Show raw JSON
                </button>

                <div class="debug" id="debug" hidden>
                    <pre id="output">Waiting for data...</pre>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
