<!-- static/partials/cost-usage-modal.html -->
<div class="modal-backdrop" id="cost-usage-backdrop" hidden></div>

<section class="cost-usage-modal" id="cost-usage-modal" role="dialog" aria-modal="true"
    aria-labelledby="cost-usage-title" hidden>
    <div class="cost-usage-modal-header">
        <div class="cost-usage-title-wrap">
            <h2 class="cost-usage-title">Device Costs</h2>
            <div class="cost-usage-subtitle" id="cost-usage-subtitle">Today</div>
        </div>

        <div class="cost-usage-total-wrap">
            <div class="cost-usage-total" id="cost-usage-total">£--</div>
        </div>
    </div>

    <div class="cost-usage-toolbar">
        <div class="cost-usage-toggle-group">
            <button class="cost-usage-toggle-button active" id="cost-usage-range-today" type="button">
                Today
            </button>
            <button class="cost-usage-toggle-button" id="cost-usage-range-current" type="button">
                Current
            </button>
        </div>
    </div>

    <div class="cost-usage-modal-body">
        <div class="cost-usage-list" id="cost-usage-list">
            <div class="cost-usage-empty">No cost data available</div>
        </div>
    </div>

    <div class="cost-usage-modal-footer">
        <button class="cost-usage-close-button" id="cost-usage-close-button" type="button">
            Close
        </button>
    </div>
</section>
